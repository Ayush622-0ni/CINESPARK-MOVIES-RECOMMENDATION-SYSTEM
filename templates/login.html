<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | CineSpark</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-container {
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #ffcc70;
        }

        p {
            font-size: 14px;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .creator {
            font-weight: 600;
            color: #00ffd5;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 81, 47, 0.6);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 13px;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="movie-icon">🎬</div>

        <h1>Welcome to CineSpark</h1>
        <p>
            Movie Recommendation System<br>
            created by <span class="creator">Ayush Goswami</span>
        </p>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Enter Username" required>
            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

            <!-- Error Message -->
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </form>

        <footer>
            ✨ Discover movies you’ll love
        </footer>
    </div>

</body>
</html>
